<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vector</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080f;color:#ddd;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:#0d0d1a;border-bottom:2px solid #2a2a4a;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
header h1{font-size:1.1rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#8888ff}
#clock{font-size:.75rem;color:#555;margin-left:auto}
#conv-state{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;transition:background .3s,color .3s}
#conv-state.idle{background:#1a1a1a;color:#444}
#conv-state.heard{background:#2a2600;color:#ffee66}
#conv-state.thinking{background:#002a2a;color:#44ddcc;animation:pteal 1s ease-in-out infinite}
#conv-state.speaking{background:#00152a;color:#66ccff;animation:pblue .8s ease-in-out infinite}
#conv-state.ready{background:#002200;color:#44cc88}
@keyframes pteal{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes pblue{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Layout ── */
.main{flex:1;display:grid;padding:14px;gap:14px;grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto auto}
@media(max-width:700px){.main{grid-template-columns:1fr}}

/* ── Cards ── */
.card{background:#0e0e1c;border:1px solid #1e1e36;border-radius:8px;overflow:hidden}
.card-head{padding:8px 14px;font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#555;border-bottom:1px solid #151528}

/* ── Camera ── */
#cam-card{grid-column:1;grid-row:1/4}
#cam-wrap{position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-height:220px}
#cam-img{width:100%;display:block;transition:filter .3s}
#cam-img.nv{filter:brightness(3) contrast(1.8) saturate(0) hue-rotate(90deg) sepia(0.4)}
#cam-offline{position:absolute;color:#333;font-size:.8rem;text-align:center}
#nv-btn{position:absolute;top:8px;right:8px;z-index:10;background:#0008;border:1px solid #0f0a;color:#0f0a;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:4px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:background .2s}
#nv-btn.on{background:#0a200a;border-color:#44ff44;color:#44ff44}
#nv-btn:hover{background:#0a200a}

/* ── Live thought box — the star of the show ── */
#thought-card{grid-column:2;grid-row:1}
#heard-line{padding:8px 14px 4px;font-size:.72rem;color:#555;border-bottom:1px solid #0d0d1a;min-height:28px}
#heard-line span{color:#ffee66;font-weight:600}
#building-box{padding:8px 14px;font-size:.8rem;color:#44ddcc;line-height:1.5;min-height:60px;font-style:italic;word-break:break-word;transition:opacity .15s}
#building-box.empty{color:#1a1a2a;font-style:normal}
#building-cursor{display:inline-block;width:2px;height:.85em;background:#44ddcc;vertical-align:middle;animation:blink .8s step-end infinite;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Status ── */
#status-card{grid-column:2;grid-row:2}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 14px}
.stat{display:flex;flex-direction:column;gap:3px}
.stat-label{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444}
.stat-value{font-size:.9rem;font-weight:600;color:#bbb}
.stat-value.green{color:#44cc88}.stat-value.yellow{color:#ffcc44}.stat-value.red{color:#ff4444}.stat-value.dim{color:#555}
.batt-wrap{display:flex;align-items:center;gap:8px}
.batt-bar{flex:1;height:6px;background:#1a1a2a;border-radius:3px;overflow:hidden}
.batt-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── Activity feed ── */
#activity-card{grid-column:2;grid-row:3}
#activity-list{padding:8px 14px;max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.evt{display:flex;gap:8px;align-items:flex-start;font-size:.78rem;line-height:1.4}
.evt-icon{flex-shrink:0;font-size:.9rem;margin-top:1px}
.evt-body{flex:1}
.evt-type{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#555;margin-bottom:1px}
.evt-text{color:#ccc}
.evt.heard .evt-text{color:#ffee66}.evt.said .evt-text{color:#66ccff}
.evt.sensor .evt-text{color:#cc88ff}.evt.face .evt-text{color:#44dd88}
.evt.weather .evt-text{color:#ff8844}.evt.thinking .evt-text{color:#555;font-style:italic}
.evt-age{font-size:.58rem;color:#383848;margin-top:2px}

/* ── Mood strip ── */
#mood-card{grid-column:1/3;grid-row:4}
.mood-inner{padding:10px 14px;font-size:.8rem;color:#777;font-style:italic;line-height:1.5}
.mood-inner span{color:#aaa;font-style:normal;font-weight:600}

#home-btn{position:fixed;bottom:14px;right:14px;z-index:200;background:#111;border:1px solid #2a2a2a;color:#555;font-size:.72rem;padding:5px 13px;border-radius:5px;text-decoration:none;opacity:.6;transition:opacity .2s}
#home-btn:hover{opacity:1;color:#aaa;border-color:#555}
</style>
</head>
<body>
<header>
  <h1>&#x1F916; Vector</h1>
  <div id="conv-state" class="idle">Idle</div>
  <div id="clock"></div>
</header>
<div class="main">

  <!-- Camera -->
  <div class="card" id="cam-card"><div class="card-head">Camera</div>
    <div id="cam-wrap">
    <img id="cam-img" src="" style="display:none" alt="">
    <div id="cam-offline">Camera offline</div>
    <button id="nv-btn" onclick="toggleNV()">&#x1F7E2; NV</button>
  </div></div>

  <!-- Live thought — what was heard + what's being generated -->
  <div class="card" id="thought-card">
    <div class="card-head">Live Thought</div>
    <div id="heard-line">Heard: <span id="heard-text">—</span></div>
    <div id="building-box" class="empty">Waiting...<span id="building-cursor" style="display:none"></span></div>
  </div>

  <!-- Status -->
  <div class="card" id="status-card"><div class="card-head">Status</div>
    <div class="status-grid">
      <div class="stat"><div class="stat-label">Battery</div><div class="batt-wrap"><div class="batt-bar"><div class="batt-fill" id="batt-fill" style="width:0%"></div></div><div class="stat-value" id="batt-pct">--</div></div></div>
      <div class="stat"><div class="stat-label">Charger</div><div class="stat-value dim" id="charger-val">--</div></div>
      <div class="stat"><div class="stat-label">Carried</div><div class="stat-value dim" id="pickup-val">--</div></div>
      <div class="stat"><div class="stat-label">Brain</div><div class="stat-value dim" id="model-val">--</div></div>
      <div class="stat"><div class="stat-label">Seeing</div><div class="stat-value dim" id="face-val">--</div></div>
      <div class="stat"><div class="stat-label">Quiet</div><div class="stat-value dim" id="quiet-val">--</div></div>
    </div></div>

  <!-- Activity -->
  <div class="card" id="activity-card"><div class="card-head">Activity Log</div>
    <div id="activity-list"><div style="padding:8px 14px;color:#333;font-size:.75rem">Connecting...</div></div></div>

  <!-- Mood -->
  <div class="card" id="mood-card"><div class="card-head">Mood</div>
    <div class="mood-inner" id="mood-text">Loading...</div></div>

</div>
<a id="home-btn" href="http://localhost:8080/">&#8962; Home</a>

<script>
var VAI = "{{VECTOR_AI_URL}}";

function tick(){var n=new Date();document.getElementById("clock").textContent=n.toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"})+"  "+n.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",second:"2-digit"});}
tick();setInterval(tick,1000);

// Camera — MJPEG streams stall silently, so we force-restart every 25s
var _nvOn=false;
function toggleNV(){
  _nvOn=!_nvOn;
  var img=document.getElementById("cam-img");
  var btn=document.getElementById("nv-btn");
  img.classList.toggle("nv",_nvOn);
  btn.classList.toggle("on",_nvOn);
  btn.textContent=_nvOn?"🟢 NV ON":"🟢 NV";
}
var camStarted=false, camRestartTimer=null;
function startCam(){
  if(camStarted)return;
  camStarted=true;
  if(camRestartTimer){clearTimeout(camRestartTimer);camRestartTimer=null;}
  var img=document.getElementById("cam-img");
  img.src=VAI+"/v1/cam?t="+Date.now();
  img.onload=function(){
    img.style.display="block";
    document.getElementById("cam-offline").style.display="none";
  };
  img.onerror=function(){
    img.style.display="none";
    document.getElementById("cam-offline").style.display="block";
    camStarted=false;
    setTimeout(startCam,4000);
  };
  // Force fresh stream every 25s regardless — prevents silent MJPEG stalls
  camRestartTimer=setTimeout(function(){
    camStarted=false;
    img.src="";
    startCam();
  },25000);
}
startCam();

// Status
function fetchStatus(){fetch(VAI+"/v1/status").then(r=>r.json()).then(function(d){
  // battery_level is an enum: 0=unknown 1=low 2=nominal 3=full
  var lvl=d.battery_level;
  var lvlLabels={0:"Unknown",1:"Low",2:"Normal",3:"Full"};
  var lvlPct={0:0,1:20,2:65,3:100};
  var lvlColor={0:"#555",1:"#ff4444",2:"#ffcc44",3:"#44cc88"};
  if(lvl!=null){
    var lbl=lvlLabels[lvl]||"--";
    var p=lvlPct[lvl]||0;
    var volts=d.battery_volts?(" "+d.battery_volts.toFixed(2)+"V"):"";
    document.getElementById("batt-pct").textContent=lbl+volts;
    var f=document.getElementById("batt-fill");
    f.style.width=p+"%";
    f.style.background=lvlColor[lvl]||"#555";
  }
  var ch=document.getElementById("charger-val");
  var onCharger=d.on_charger;
  if(onCharger===true){ch.textContent="Charging";ch.className="stat-value green";}
  else if(onCharger===false){ch.textContent="Off charger";ch.className="stat-value yellow";}
  else{ch.textContent="--";ch.className="stat-value dim";}
  var pu=document.getElementById("pickup-val");
  if(d.is_picked_up===true){pu.textContent="Picked up";pu.className="stat-value yellow";}
  else if(d.is_picked_up===false){pu.textContent="On desk";pu.className="stat-value green";}
  else{pu.textContent="--";pu.className="stat-value dim";}
  var ml=document.getElementById("model-val");
  if(d.model_loaded){ml.textContent="Loaded";ml.className="stat-value green";}
  else{ml.textContent="Cold";ml.className="stat-value dim";}
  var fv=document.getElementById("face-val");var fc=d.face;
  if(fc&&!fc.is_stranger&&fc.name){fv.textContent=fc.name;fv.className="stat-value green";}
  else if(fc&&fc.is_stranger){fv.textContent="Stranger";fv.className="stat-value yellow";}
  else{fv.textContent="Nobody";fv.className="stat-value dim";}
  var qv=document.getElementById("quiet-val");
  if(d.quiet_mode){qv.textContent="On";qv.className="stat-value yellow";}else{qv.textContent="Off";qv.className="stat-value dim";}
  if(d.mood)document.getElementById("mood-text").innerHTML="<span>Vector feels:</span> "+esc(d.mood);
  // Populate heard line from status on load
  if(d.last_heard&&!_lastHeard)setHeard(d.last_heard);
}).catch(()=>{});}
fetchStatus();setInterval(fetchStatus,3000);

// ── Live thought box ──────────────────────────────────────────────────────────
var _lastHeard="";
var _building="";
var _buildingActive=false;

function setHeard(txt){
  _lastHeard=txt;
  var el=document.getElementById("heard-text");
  // Strip {{...}} commands from display
  el.textContent=txt.replace(/\{\{[^}]*\}\}/g,"").trim()||"—";
}

function setBuilding(txt){
  var box=document.getElementById("building-box");
  var cur=document.getElementById("building-cursor");
  if(!txt){
    box.textContent="";
    box.className="empty";
    cur.style.display="none";
    _buildingActive=false;
  } else {
    // Strip {{...}} commands
    var clean=txt.replace(/\{\{[^}]*\}\}/g,"").trim();
    box.className="";
    box.textContent=clean;
    box.appendChild(cur);
    cur.style.display="inline-block";
    _buildingActive=true;
  }
  _building=txt;
}

// ── Conversation state pill ───────────────────────────────────────────────────
var _rt=null,_st=document.getElementById("conv-state");
function setS(s){_st.className=s;var sl={idle:"Idle",heard:"Heard",thinking:"Thinking...",speaking:"Speaking",ready:"Ready"};_st.textContent=sl[s]||s;if(_rt){clearTimeout(_rt);_rt=null;}if(s==="ready"){_rt=setTimeout(function(){setS("idle");},8000);}}

// ── Activity feed ─────────────────────────────────────────────────────────────
var ICONS={heard:"Mic",thinking:"...",said:"Spk",sensor:"Tch",face:"Who",weather:"Wrn",battery:"Bat",ready:null,ping:null,building:null};
var LABELS={heard:"Heard",thinking:"Thinking",said:"Said",sensor:"Sensor",face:"Face",weather:"Weather",battery:"Battery"};
var _evts=[];
function ageStr(ts){if(!ts)return"";var s=Math.floor(Date.now()/1000-ts);if(s<5)return"just now";if(s<60)return s+"s ago";if(s<3600)return Math.floor(s/60)+"m ago";return Math.floor(s/3600)+"h ago";}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function evtText(e){
  if(e.type==="heard"||e.type==="said")return esc((e.text||"").replace(/\{\{[^}]*\}\}/g,"").trim());
  if(e.type==="thinking")return"Processing...";
  if(e.type==="sensor"){var m={pickup:"Picked up",putdown:"Put down",pet:"Being petted"};return(m[e.event]||e.event)+(e.response?" &mdash; "+esc(e.response):"");}
  if(e.type==="face")return e.stranger?"Stranger detected":"Recognized: "+esc(e.name||"");
  if(e.type==="weather")return esc(e.event_type||"")+(e.area?" &mdash; "+esc(e.area):"");
  return"";
}
function render(){
  var list=document.getElementById("activity-list");
  var vis=_evts.filter(function(e){return ICONS.hasOwnProperty(e.type)&&ICONS[e.type]!==null;}).slice(-20).reverse();
  var html=vis.map(function(e){var t=evtText(e);if(!t&&e.type!=="thinking")return"";return'<div class="evt '+esc(e.type)+'"><div class="evt-icon">'+ICONS[e.type]+'</div><div class="evt-body"><div class="evt-type">'+esc(LABELS[e.type]||e.type)+'</div><div class="evt-text">'+t+'</div><div class="evt-age" data-ts="'+(e.ts||0)+'">'+ageStr(e.ts)+'</div></div></div>';}).join("");
  list.innerHTML=html||'<div style="padding:8px 14px;color:#333;font-size:.75rem">Waiting for activity...</div>';
}

// ── SSE ───────────────────────────────────────────────────────────────────────
var _rt2=null;
function connectSSE(){
  if(_rt2){clearTimeout(_rt2);_rt2=null;}
  var src=new EventSource(VAI+"/v1/activity/stream");
  src.onmessage=function(e){
    try{
      var d=JSON.parse(e.data);
      if(d.type==="ping")return;

      // Drive state pill
      if(d.type==="heard"){setS("heard");setHeard(d.text||"");}
      else if(d.type==="thinking"){setS("thinking");}
      else if(d.type==="building"){setBuilding(d.text||"");if(d.text)setS("thinking");}
      else if(d.type==="said"){setS("speaking");setBuilding("");}
      else if(d.type==="ready"){setS("ready");setBuilding("");}

      // Push to log (skip building events — they'd spam the log)
      if(d.type!=="building"&&d.type!=="ping"){
        _evts.push(d);
        if(_evts.length>200)_evts=_evts.slice(-200);
        render();
      }
      if(d.type==="battery")fetchStatus();
    }catch(err){}
  };
  src.onerror=function(){src.close();_rt2=setTimeout(connectSSE,2000);};
}
connectSSE();

// Age ticker
setInterval(function(){document.querySelectorAll(".evt-age[data-ts]").forEach(function(el){var ts=parseFloat(el.getAttribute("data-ts"));if(ts)el.textContent=ageStr(ts);});},5000);
</script>
</body>
</html>
